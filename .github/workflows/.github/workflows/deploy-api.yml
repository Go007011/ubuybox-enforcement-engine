name: Build and deploy Node.js project to Azure Function App - ubuybox-api-007011

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - run: zip release.zip ./* -r

      - uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: node-app

      - run: |
          unzip release.zip
          rm release.zip

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7D9B52BF16A64442BC5521DBE4F57E09 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_17635350150D4121B0362FFB42C5A5FD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_378DA29E7A3A447EB0F6449A289BC48A }}

      - uses: Azure/functions-action@v1
        with:
          app-name: 'ubuybox-api-007011'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
