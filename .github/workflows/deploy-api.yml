name: Deploy UBUYBOX API to Azure

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20.x"
  AZURE_FUNCTIONAPP_NAME: "ubuybox-api-007011"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build deployment package from /api
        run: |
          rm -rf build-artifact
          mkdir -p build-artifact
          cp -R api/* build-artifact/
          cp package.json build-artifact/
          if [ -f package-lock.json ]; then cp package-lock.json build-artifact/; fi
          if [ -f host.json ]; then cp host.json build-artifact/; fi

      - name: Install production dependencies in package
        working-directory: ./build-artifact
        run: npm install --omit=dev

      - name: Archive deployment package
        run: |
          cd build-artifact
          zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functionapp-package
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: functionapp-package

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          slot-name: Production
          package: ./release.zip
